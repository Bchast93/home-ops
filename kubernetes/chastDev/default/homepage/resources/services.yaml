- Infrastructure:
    - {{ .QNAP_NAME}}:
        icon: qnap
        href: {{ .QNAP_URL }}
        description: QNAP {{ .QNAP_MODEL }}
        widget:
          type: qnap
          url: {{ .QNAP_URL }}
          username: {{ .QNAP_RO_USER }}
          password: {{ .QNAP_RO_PASS }}
    - Cloudflared:
        href: https://dash.cloudflare.com/
        icon: cloudflare-zero-trust
        description: Cloudflared Tunnel Status
        widget:
          type: cloudflared
          accountid: {{ .CF_ACCOUNT_ID }}
          tunnelid: {{ .CF_TUNNEL_ID }}
          key: {{ .CF_API_TOKEN }}
- Calendar:
    - Agenda:
        widget:
          type: calendar
          view: agenda
          maxEvents: 20
          integrations:
            - type: sonarr
              service_group: Downloads
              service_name: Sonarr
            - type: radarr
              service_group: Downloads
              service_name: Radarr
