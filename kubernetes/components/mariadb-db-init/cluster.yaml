---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.32.1/job-batch-v1.json
apiVersion: batch/v1
kind: Job
metadata:
  name: &name "${APP}-mariadb-init"
  labels:
    app.kubernetes.io/instance: *name
    app.kubernetes.io/name: *name
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/instance: *name
        app.kubernetes.io/name: *name
    spec:
      restartPolicy: Never
      containers:
        - name: grant-db-privileges
          image: docker.io/library/mariadb:11.4
          env:
            # Databases to grant on (space-separated)
            - name: DB_NAMES
              value: "${DB_NAMES:-${APP}}"

            # User that should receive privileges
            - name: DB_USER
              value: "${DB_USER:-${APP}}"

            # Root / admin connection details from a Secret
            - name: MARIADB_HOST
              valueFrom:
                secretKeyRef:
                  name: "${NAMESPACE}-mariadb"
                  key: host
            - name: MARIADB_PORT
              valueFrom:
                secretKeyRef:
                  name: "${NAMESPACE}-mariadb"
                  key: port
            - name: MARIADB_ROOT_USER
              valueFrom:
                secretKeyRef:
                  name: "${NAMESPACE}-mariadb"
                  key: username
            - name: MARIADB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: "${NAMESPACE}-mariadb"
                  key: password
          command:
            - /bin/bash
            - -c
          args:
            - |
              set -euo pipefail

              : "${MARIADB_PORT:=3306}"

              for DB in $DB_NAMES; do
                echo "Granting privileges on database: $DB to user: $DB_USER"

                # Create DB if it doesn't exist (optional, remove if you don't want this)
                mysql \
                  -h "$MARIADB_HOST" \
                  -P "$MARIADB_PORT" \
                  -u "$MARIADB_ROOT_USER" \
                  -p "$MARIADB_ROOT_PASSWORD" \
                  -e "CREATE DATABASE IF NOT EXISTS \`$DB\`;"

                # Grant all privileges on that DB to the user (from any host)
                mysql \
                  -h "$MARIADB_HOST" \
                  -P "$MARIADB_PORT" \
                  -u "$MARIADB_ROOT_USER" \
                  -p "$MARIADB_ROOT_PASSWORD" \
                  -e "GRANT ALL PRIVILEGES ON \`$DB\`.* TO '$DB_USER'@'%'; FLUSH PRIVILEGES;"
              done

              echo "MariaDB grants completed."
          resources:
            limits:
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 52Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
      securityContext:
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
