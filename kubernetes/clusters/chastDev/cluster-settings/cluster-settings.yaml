---
# yaml-language-server: $schema=https://raw.githubusercontent.com/yannh/kubernetes-json-schema/master/v1.32.1/configmap-v1.json
apiVersion: v1
kind: ConfigMap
metadata:
  name: cluster-settings
data:
  KS_RETRY_INTERVAL: "2m"
  KS_TIMEOUT: "5m"

  VAULT_PREFIX: "chastDev"

  TIMEZONE: "US/Central"
  CLUSTER_CIDR: "10.42.0.0/16"
  SERVICE_CIDR: "10.43.0.0/16"
  LAN_CIDR: "10.100.150.0/23"
  KUBE_DNS_ADDR: "10.43.0.10"
  CLUSTER_API_ADDR: "10.100.150.200"
  CLOUDFLARE_GATEWAY_ADDR: "10.100.150.130"
  CLUSTER_GATEWAY_ADDR: "10.100.150.131"
  CLUSTER_DNS_GATEWAY_ADDR: "10.100.150.132"
  CEPH_DEVICE_PATH_FILTER: /dev/nvme1n1
  CLUSTER_BGP_ASN: "65531"

  # should be a valid JSON array representing spec.nodePathMap[0].paths
  LOCAL_PATH_PROVISIONER_NODE_PATHS: '["/var/mnt/lpp-0"]'

 # SB_CLUSTER_UUID: "1af0cf2e-2292-4db5-9b67-ab6fe5b8920f"

  GIT_REPO: "github.com/bchast93/home-ops"
  GIT_REPO_REF: "refs/heads/main"
  INGRESS_SECURE_PATH: "spec/values/ingress/app/annotations"

  VOLSYNC_PVC_STORAGECLASS: "ceph-block"
  VOLSYNC_SNAPSHOTCLASS: "csi-ceph-blockpool"
  VOLSYNC_CACHE_SNAPSHOTCLASS: "ceph-block"
  VOLSYNC_STORAGECLASS: "ceph-block"
  VOLSYNC_S3_BUCKET: "chastdev-volsync"

  THEME_PARK_THEME: "space-gray"

  SVC_VPN_ADDR: "10.100.150.133"
  SVC_POSTGRES_ADDR: "10.100.150.134"
  SVC_DOWNLOADS_PGO_ADDR: "10.100.150.135"
  SVC_PLEX_ADDR: "10.100.150.138"
