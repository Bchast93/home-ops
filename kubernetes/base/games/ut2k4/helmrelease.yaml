# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app ut2004server
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: app-template
  values:
    controllers:
      ut2004server:
        containers:
          app:
            image:
              repository: lacledeslan/gamesvr-ut2004-freeplay
              tag: latest
            workingDir: /app/System
            command: ["/app/System/ucc-bin"]
            args:
              - server
              - "DM-Antalus.ut2?AdminName=admin?AdminPassword=admin?AutoAdjust=true?bPlayerMustBeReady=true?Game=XGame.XDeathMatch?MinPlayers=2?WeaponStay=false"
              - nohomedir
            resources:
              requests:
                memory: 1Gi
                cpu: 500m
    service:
      app:
        controller: *app
        type: LoadBalancer
        annotations:
          external-dns.alpha.kubernetes.io/hostname: "ut2k4.${SECRET_DOMAIN}"
        ports:
          game:
            protocol: UDP
            port: 7777
          query:
            protocol: UDP
            port: 7778
          extra1:
            protocol: UDP
            port: 7787
          master:
            protocol: UDP
            port: 28902
          web:
            protocol: TCP
            port: 8888
    route:
      app:
        hostnames:
          - "ut2k4admin.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-external
            namespace: network
        rules:
          - backendRefs:
              - name: *app
                port: 8888
    persistence:
      config-file:
        type: configMap
        name: *app
        globalMounts:
          - path: /app/System/UT2004.ini
            subPath: UT2004.ini
