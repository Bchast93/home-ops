---
# yaml-language-server: $schema=https://kube-schemas.pages.dev/external-secrets.io/externalsecret_v1beta1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: &name homepage
spec:
  refreshInterval: 12h
  secretStoreRef:
    kind: ClusterSecretStore
    name: akeyless-secret-store
  target:
    name: *name
    template:
      engineVersion: v2
      templateFrom:
        - configMap:
            name: *name
            items:
              - key: services.yaml
      data:
        HOMEPAGE_VAR_CLOUDFLARED_ACCOUNTID: "{{ .CF_ACCOUNT_ID }}"
        HOMEPAGE_VAR_CLOUDFLARED_API_TOKEN: "{{ .CF_API_TOKEN }}"
        HOMEPAGE_VAR_CLOUDFLARED_TUNNELID: "{{ .CF_TUNNEL_ID }}"
        HOMEPAGE_VAR_GRAFANA_PASSWORD: "{{ .GRAFANA_ADMIN_PASSWORD }}"
        HOMEPAGE_VAR_PLEX_TOKEN: "{{ .PLEX_TOKEN }}"
        HOMEPAGE_VAR_PROWLARR_TOKEN: "{{ .PROWLARR_API_KEY }}"
        HOMEPAGE_VAR_QNAP_PASSWORD: "{{ .QNAP_RO_PASS }}"
        HOMEPAGE_VAR_QNAP_USERNAME: "{{ .QNAP_RO_USER }}"
        HOMEPAGE_VAR_RADARR_TOKEN: "{{ .RADARR_API_KEY }}"
        HOMEPAGE_VAR_SABNZBD_TOKEN: "{{ .SABNZBD_API_KEY }}"
        HOMEPAGE_VAR_SEERR_TOKEN: "{{ .SEERR_API_KEY }}"
        HOMEPAGE_VAR_SONARR_TOKEN: "{{ .SONARR_API_KEY }}"
        HOMEPAGE_VAR_TAUTULLI_TOKEN: "{{ .TAUTULLI_API_KEY }}"
  dataFrom:
    - extract:
        key: "${VAULT_PREFIX}/cloudflare"
    - extract:
        key: "${VAULT_PREFIX}/grafana"
    - extract:
        key: "${VAULT_PREFIX}/plex"
    - extract:
        key: "${VAULT_PREFIX}/prowlarr"
    - extract:
        key: qnap
    - extract:
        key: "${VAULT_PREFIX}/radarr"
    - extract:
        key: "${VAULT_PREFIX}/sabnzbd"
    - extract:
        key: "${VAULT_PREFIX}/seerr"
    - extract:
        key: "${VAULT_PREFIX}/sonarr"
    - extract:
        key: "${VAULT_PREFIX}/tautulli"
